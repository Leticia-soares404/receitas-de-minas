<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receitas de Minas</title>
    <link rel="stylesheet"  href="style.css">
</head>
<body>
    <header class="titulo">
        <h1>
        Delícias de Minas
        </h1>
        <section>
            <h2>
            Pão de Queijo
            </h2>
           <img src="img/pao-de-queijo-xd.jpg" alt="pão de Queijo"> 
           <button popovertarget="segredo">Ver Segredo do Chef</button>
           <div id="segredo" popover>
                <p>
                    Jamais coloque os ovos com a massa quente, 
                    senão eles cozinham e o pão não cresce!
                </p>
           </div>
        </section>
        <section id="ingredientes">
            <h2>
                Ingredientes
            </h2>
            <ul>
                <li>1 ovo inteiro</li>
                <li>1 colher (café) de sal</li>
                <li>1 xícara (chá) de leite</li>
                <li>1 xícara (chá) de queijo minas meia cura ralado</li>
                <li>1 xícara (chá) de polvilho azedo</li>
            </ul>
        </section>
    </header>
</body>
</html>
